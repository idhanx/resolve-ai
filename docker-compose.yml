version: "3.9"

services:
  backend:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    container_name: resolveai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://localhost:9000/predict}
      - DB_ECHO=${DB_ECHO:-false}
    volumes:
      # Persist synthetic RAG data if using local CSV
      - ./synthetic_rag_data.csv:/app/../synthetic_rag_data.csv:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - resolveai-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: resolveai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - resolveai-net

networks:
  resolveai-net:
    driver: bridge
